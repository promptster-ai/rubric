# Type-checks the rubric contract, validates rubric.json loads without throwing,
# and verifies the README's generated rubric section is in sync with rubric.json.
# tsc only type-checks (rubric.json is cast past its type); the `validate` step
# actually executes the import-time structural validator in src/index.ts — that
# is the guard that catches a malformed data edit.
name: typecheck

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Type-check
        run: npx -y -p typescript@5 tsc --noEmit -p tsconfig.json
      - name: Validate rubric loads (runtime structural checks)
        run: npx -y tsx scripts/validate.mjs
      - name: README in sync with rubric.json
        run: node scripts/render-readme.mjs --check
