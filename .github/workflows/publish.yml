# Publishes @promptster/rubric to the public npm registry on a `v*` tag.
#
# The package is public under the @promptster scope on npmjs.org (siblings:
# @promptster/cli, @promptster/teams-cli, @promptster/cc-audit). Publishing
# needs an automation token with publish rights to the @promptster scope,
# stored as the NPM_TOKEN repo secret.
#
#   git tag v0.3.0 && git push origin v0.3.0
name: publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Same guards CI runs on PRs — a tag shouldn't be able to publish a
      # broken artifact.
      - name: Type-check
        run: npx -y -p typescript@5 tsc --noEmit -p tsconfig.json
      - name: README in sync with rubric.json
        run: node scripts/render-readme.mjs --check

      - name: Tag matches package.json version
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$PKG" != "$TAG" ]; then
            echo "tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
