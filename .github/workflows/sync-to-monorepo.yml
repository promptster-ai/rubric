# This repo is the CANONICAL source of truth for the rubric. When the rubric
# source changes here, open a PR against the Promptster monorepo
# (pa-arth/Promptster) updating packages/rubric/src so the product stays in
# lockstep. The monorepo consumes this; it never edits the rubric directly.
#
# Requires a repo secret MONOREPO_SYNC_TOKEN: a fine-grained PAT with
# Contents: Read and write + Pull requests: Read and write on pa-arth/Promptster.
name: Sync rubric to monorepo

on:
  push:
    branches: [main]
    paths:
      - "src/rubric.json"
      - "src/types.ts"
      - "src/index.ts"
      - "src/rubric.schema.json"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this (canonical) repo
        uses: actions/checkout@v4
        with:
          path: public

      - name: Checkout monorepo
        uses: actions/checkout@v4
        with:
          repository: pa-arth/Promptster
          token: ${{ secrets.MONOREPO_SYNC_TOKEN }}
          path: monorepo

      - name: Copy rubric source into monorepo
        run: |
          cp public/src/rubric.json        monorepo/packages/rubric/src/rubric.json
          cp public/src/types.ts           monorepo/packages/rubric/src/types.ts
          cp public/src/index.ts           monorepo/packages/rubric/src/index.ts
          cp public/src/rubric.schema.json monorepo/packages/rubric/src/rubric.schema.json

      - name: Open sync PR on monorepo
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.MONOREPO_SYNC_TOKEN }}
          path: monorepo
          branch: rubric-sync
          base: main
          delete-branch: true
          commit-message: "sync: rubric from promptster-ai/rubric"
          title: "Sync rubric from public repo"
          body: |
            Automated sync of the rubric source files from the canonical public
            repo ([promptster-ai/rubric](https://github.com/promptster-ai/rubric)),
            triggered by a merge there. Updates `packages/rubric/src/**` only —
            the monorepo's package.json, publishConfig, and GitHub-Packages
            publish flow are untouched.
